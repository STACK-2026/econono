name: blog-auto

# Cron : 1-3 articles/jour à heure aléatoire 7h-9h Paris (mémoire règle).
# 7h Paris (été UTC+2) = 5h UTC, 9h Paris = 7h UTC. On schedule à 5h05 / 6h05 / 7h05 UTC.

on:
  schedule:
    - cron: "5 5 * * *"   # 07:05 Paris été · 1er article
    - cron: "5 6 * * *"   # 08:05 Paris été · 2ème article (si plan)
    - cron: "5 7 * * *"   # 09:05 Paris été · 3ème article (si plan)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (génère mais ne pousse pas)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: blog-auto
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: blog-auto/requirements.txt

      - name: Install deps
        working-directory: blog-auto
        run: pip install -r requirements.txt

      - name: Random delay 0-30 min (anti-pattern bot)
        run: |
          DELAY=$((RANDOM % 1800))
          echo "Sleeping ${DELAY}s before publish (mimic editorial cadence)..."
          sleep $DELAY

      - name: Publish next due article
        working-directory: blog-auto
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BING_URL_SUBMISSION_KEY: ${{ secrets.BING_URL_SUBMISSION_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python publish.py

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-auto-logs-${{ github.run_id }}
          path: blog-auto/logs/
          retention-days: 14
          if-no-files-found: ignore
