name: deploy-site

# Trigger : push main + workflow_run après blog-auto + rebuild-guard + manual
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "!site/dist/**"
      - "!site/node_modules/**"
  workflow_run:
    workflows:
      - "blog-auto"
      - "rebuild-guard"
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install deps
        working-directory: site
        run: npm ci --prefer-offline --no-audit
      - name: Sanitize content frontmatter (clamp description to 160 chars)
        # Routine claude.ai occasionally publishes articles with description > 160 chars,
        # which Astro content schema rejects. Clamp at build time to keep prod unblocked.
        working-directory: site
        run: |
          python3 - <<'PY'
          import re, pathlib
          CAP = 160
          changed = []
          for md in pathlib.Path("src/content/blog").rglob("*.md"):
              text = md.read_text(encoding="utf-8")
              m = re.search(r'^description:\s*"(.+?)"\s*$', text, re.M)
              if not m: continue
              desc = m.group(1)
              if len(desc) <= CAP: continue
              trimmed = desc[:CAP-1].rsplit(" ", 1)[0].rstrip(",;:.- ") + "…"
              text2 = text.replace(m.group(0), f'description: "{trimmed}"', 1)
              md.write_text(text2, encoding="utf-8")
              changed.append((md.name, len(desc), len(trimmed)))
          for name, before, after in changed:
              print(f"  CLAMP {name}: {before} -> {after}")
          print(f"sanitize: {len(changed)} clamped")
          PY


      - name: Build site
        working-directory: site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy dist --project-name=econono --branch=main

      - name: Purge CF cache for SEO-critical files
        # Activates once CF_PURGE_TOKEN secret is set (Phase 3 of deploy hardening).
        # Until then this step gracefully no-ops -- safe to merge.
        if: success()
        env:
          CF_PURGE_TOKEN: ${{ secrets.CF_PURGE_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          SITE_URL: https://econono.com
        run: |
          if [ -z "$CF_PURGE_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "CF_PURGE_TOKEN or CF_ZONE_ID missing, skip (Phase 3 not yet wired)"; exit 0;
          fi
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_PURGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"files\":[\"$SITE_URL/robots.txt\",\"$SITE_URL/sitemap.xml\",\"$SITE_URL/sitemap-index.xml\",\"$SITE_URL/llms.txt\",\"$SITE_URL/llms-full.txt\",\"$SITE_URL/ai-sitemap.xml\"]}" || true

      - name: Submit to IndexNow (Bing/Yandex/Naver)
        if: success()
        run: |
          curl -s -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "econono.com",
              "key": "${{ secrets.INDEXNOW_KEY }}",
              "keyLocation": "https://econono.com/${{ secrets.INDEXNOW_KEY }}.txt",
              "urlList": ["https://econono.com/", "https://econono.com/calculateurs/"]
            }' || echo "IndexNow ping failed (non-blocking)"
