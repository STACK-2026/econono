name: deploy-site

# Trigger : push main + workflow_run après blog-auto + rebuild-guard + manual
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "!site/dist/**"
      - "!site/node_modules/**"
  workflow_run:
    workflows:
      - "blog-auto"
      - "rebuild-guard"
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install deps
        working-directory: site
        run: npm ci --prefer-offline --no-audit

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy dist --project-name=econono --branch=main

      - name: Submit to IndexNow (Bing/Yandex/Naver)
        if: success()
        run: |
          curl -s -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "econono.com",
              "key": "${{ secrets.INDEXNOW_KEY }}",
              "keyLocation": "https://econono.com/${{ secrets.INDEXNOW_KEY }}.txt",
              "urlList": ["https://econono.com/", "https://econono.com/calculateurs/"]
            }' || echo "IndexNow ping failed (non-blocking)"
