name: rebuild-guard

# Cron daily : commit un marker file pour forcer un rebuild Cloudflare Pages.
# Permet aux articles programmés (date future) d'apparaître quand leur date arrive.
# Heure aléatoire 7h-9h Paris (memory rule).

on:
  schedule:
    - cron: "23 6 * * *" # 06:23 UTC = 08:23 Paris (été) / 07:23 Paris (hiver)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-guard
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit marker
        run: |
          git config user.name "rebuild-guard-bot"
          git config user.email "noreply@econono.com"
          # Reset-then-recreate pattern: never conflict on concurrent timestamp writes.
          # Always re-anchors to origin/main on a real branch so push from detached HEAD impossible.
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            git fetch origin
            git checkout -B main origin/main
            mkdir -p site/src/data
            DATE_ISO=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            echo "{\"lastRebuild\":\"$DATE_ISO\",\"trigger\":\"daily-cron\"}" > site/src/data/rebuild-marker.json
            git add site/src/data/rebuild-marker.json
            if git diff --cached --quiet; then echo "no changes" && exit 0; fi
            git commit -m "chore(rebuild): daily marker $(date -u +%Y-%m-%d)"
            if git push origin main; then exit 0; fi
            echo "push attempt $i failed, retrying..."
            sleep $((2 + RANDOM % 6))
          done
          echo "push failed after 5 attempts" >&2
          exit 1
